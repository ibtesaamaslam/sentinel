name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Every Monday

jobs:
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Run npm audit
        run: pnpm audit --audit-level=high || true
      - name: Run Sentinel self-scan
        run: pnpm start -- scan . --format terminal --format sarif --output sentinel-security-report
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sentinel-security-report
          path: sentinel-security-report/
